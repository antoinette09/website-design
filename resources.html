<!DOCTYPE html>
<html lang="en">
<head>
    <title>Website Design</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special Gothic Expanded One&family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <header>
        <!-- login -->
        <h3>

        <a href="#home" class ="logo-link">
            <span>Paso a Paso</span> <img style="height: 45px; width: 45px;"; src="orange.svg">
        </a>

        <!-- navigation -->
        <nav>
            <a href="index.html">Home</a>
            <a href="resources.html">Resources</a>
            <a href="schedule.html">Schedule</a>
            <a href="settings.html">Settings</a>
        </nav>

        <h3>Made by Students, for Students</h3>

    <div class="image-grid">

        <div class="resources-info">

            <div class="container">

        <div class="resources-info">

            </div>
        </div>

        <!-- dictionary -->
        <div class="resources-info">
            <div class="container">
                <a href="dictionary.html" class="resources-link">
                    <h3 class="resources-link"">Dictionary</h3>
                <img src="winter.svg" class="level-icon" alt="Adult Level" style="border: none;">

            </div>
