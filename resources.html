<!DOCTYPE html>
<html lang="es">
<head>
    <title>Paso a Paso - Resources</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script> 
</head> 

<body>
    <div id="announcement-banner"></div>

    <header class="main-header">
        <div class="header-content">
            <a href="login.html" id="login-status-link" class="login-link">Login</a>
            <a href="index.html" class="logo-link">
                <span>Paso a Paso</span> <img src="orange.svg" alt="Logo">
            </a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="resources.html" class="active">Resources</a>
                <a href="schedule.html">Schedule</a>
                <a href="settings.html">Settings</a>
            </nav>
        </div>
    </header>

    <main class="container">
        
        <section class="hero-section" style="padding: var(--spacing-lg);">
            <div class="hero-card" style="gap: var(--spacing-xs);">
                <h1 style="color: var(--primary-orange);">Explore Resources</h1>
                <p style="color: var(--bg-white); font-size: 1.2rem; font-weight: 600;">Made by Students, for Students</p>
            </div>
        </section>

        <section class="card-section">
            <div class="dashboard-grid" style="max-width: 1000px; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));">
                
                <a href="vocabulary.html" class="quick-link-btn card">
                    <div class="circle-icon" style="width: 80px; height: 80px;"><img src="spring.svg" alt="Vocabulary"></div>
                    <span style="font-size: 1.2rem; margin-top: 10px;">Vocabulary</span>
                </a>

                <a href="grammar.html" class="quick-link-btn card">
                    <div class="circle-icon" style="width: 80px; height: 80px;"><img src="summer.svg" alt="Grammar"></div>
                    <span style="font-size: 1.2rem; margin-top: 10px;">Grammar</span>
                </a>
                
                <a href="conjugation.html" class="quick-link-btn card">
                    <div class="circle-icon" style="width: 80px; height: 80px;"><img src="fall.svg" alt="Conjugation"></div>
                    <span style="font-size: 1.2rem; margin-top: 10px;">Conjugation</span>
                </a>

                <a href="dictionary.html" class="quick-link-btn card">
                    <div class="circle-icon" style="width: 80px; height: 80px;"><img src="winter.svg" alt="Dictionary"></div>
                    <span style="font-size: 1.2rem; margin-top: 10px;">Dictionary</span>
                </a>

            </div>
        </section>

    </main>

    <footer>
        <p>&copy; 2024 Paso a Paso. ¡Buena suerte!</p>
    </footer>

</html>
