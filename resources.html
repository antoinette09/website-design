<!DOCTYPE html>
<html lang="en">
<head>
    <title>Website Design</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special Gothic Expanded One&family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="script.js"></script> 
</head>

<body>


    <!-- activities + resources section -->
    <div class="container" id="resources">
        <h2  class="section-title" style="font-size: 2rem;"></font-size>Activities+Resources Across Proficiency Levels</h2>
    </div>

    <!-- fluency sections -->
    <div class="image-grid">
        <!-- A1-A2: beginner -->
        <div class="resources-info">
            <div class="container">
            <h3>A1-A2: Beginner</h3>
            <img src="baby.png" class="level-icon" alt="Baby Level" style="border: none;">
            <a href="beginner.html" class="view-resources-button">View Beginner Topics</a>
            </div>
        </div>
          
            
        <!-- B1-B2: intermediate -->
        <div class="resources-info">
            <div class="container">
                <h3>B1-B2: Intermediate</h3>
                <img src="children.png" class="level-icon" alt="Child Level" style="border: none;">
                <a href="intermediate.html" class="view-resources-button">View Intermediate Topics</a>
            </div>
        </div>
        
        <!-- C1-C2: advanced -->
        <div class="resources-info">
            <div class="container">
                <h3>C1-C2: Advanced</h3>
                <img src="teamwork.png" class="level-icon" alt="Adult Level" style="border: none;">
                <a href="advanced.html" class="view-resources-button">View Advanced Topics</a>
            </div>
        </div>
    </div>

</body>
</html>
