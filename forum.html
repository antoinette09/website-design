<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // This is the ONLY bit that MUST be here to kill the flash
        const s = JSON.parse(localStorage.getItem('a11ySettings') || '{}');
        if (s.dark || s.colorblind) document.documentElement.style.backgroundColor = '#121212';
        if (s.dark) document.documentElement.classList.add('dark-mode');
        if (s.colorblind) document.documentElement.classList.add('colorblind-mode');
        if (s.dyslexia) document.documentElement.classList.add('dyslexia-mode');

      </script>
    <title>Paso a Paso - Q&A Forum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script> 
</head>

<body>
<div id="announcement-banner">
    <span id="announcement-text"></span> <!-- Use a span for the text -->
    <script>
        (function() {
            const saved = localStorage.getItem('siteAnnouncement');
            if (saved && saved.trim() !== "") {
                const textEl = document.getElementById('announcement-text');
                if (textEl) {
                    textEl.textContent = saved;
                    // Tell the whole page we are ready to show the banner
                    document.documentElement.classList.add('banner-ready');
                }
            } else {
                // If there's truly no announcement, collapse the box
                document.getElementById('announcement-banner').style.display = 'none';
            }
        })();
    </script>
</div>
    <header class="main-header">
        <div class="header-content">
            <a href="login.html" id="login-status-link" class="login-link">Login</a>
            <a href="index.html" class="logo-link"><span>Paso a Paso</span> <img src="orange.svg" alt="Logo"></a>
            <button class="hamburger" onclick="document.getElementById('nav-menu').classList.toggle('show')">☰</button>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="resources.html">Resources</a>
                <a href="schedule.html">Schedule</a>
                <a href="forum.html" class="active">Community Q&A</a>
                <a href="settings.html">Settings</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="hero-section">
            <div class="hero-card">
                <h1 style="color: var(--primary-orange);">Peer-to-Peer Q&A</h1>
                <p style="color: var(--secondary-orange); font-size: 1.75rem; overflow-wrap: break-word;">Ask questions, share tips, and help fellow students learn!</p>
                <button class="form-button" style="margin-top: 1.5rem; background: var(--bg-white); color: var(--primary-orange);" onclick="openCreatePostModal()">+ Ask a Question</button>
            </div>
        </section>

        <section class="card-section" style="max-width: 1000px; background: transparent; box-shadow: none; padding-top: 0; min-width: 0">
            <div style="width: 100%; max-width: 8000px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem;" id="forum-container">
                <!-- Forum posts load here -->
            </div>
        </section>
    </main>

    <!-- Create Post Modal -->
    <div id="createPostModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" onclick="closeCreatePostModal()">&times;</span>
            <h3 style="color: var(--primary-orange); margin-bottom: 1.5rem;">Ask the Community</h3>
            <div class="form-group" style="font-size: 1.5rem;"><input type="text" id="post-title" placeholder="Question Title (e.g. Help with Ser vs Estar)" style="font-size: 1.25rem;" required></div>
            <div class="form-group" style="font-size: 1.5rem;"><textarea id="post-content" rows="5" placeholder="Explain what you need help with..." style="font-size: 1.25rem; width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-gray); font-family: inherit; resize: vertical;" required></textarea></div>
            <button class="form-button" onclick="saveForumPost()" style="width: 100%;">Post Question</button>
        </div>
    </div>

    <!-- View/Reply Post Modal -->
    <div id="viewPostModal" class="modal hidden">
        <div class="modal-content" style="min-width: 0; max-width: 700px; max-height: 90vh; background: var(--bg-light-orange); overflow-wrap: break-word;">
            <span class="close-modal" onclick="closeViewPostModal()">&times;</span>
            <div id="active-post-content" style="min-width: 0; width: 100%; word-break: break-word; text-align: left; margin-bottom: 2rem; overflow-wrap: break-word;"></div>
            
            <div style="border-top: 2px solid var(--border-gray); padding-top: 1.5rem; font-size: 1.5rem;">
                <h4 style="color: var(--accent-blue-dark); margin-bottom: 1.5rem; font-size: 1.5rem; overflow-wrap: break-word;">Replies</h4>
                <div id="replies-container" style="min-width: 0; font-size: 1.5rem; display: flex; width: 100%; word-break: break-word; flex-direction: column; gap: 10px; margin-bottom: 1.5rem; overflow-wrap: break-word;"></div>
                
                <div style="display: flex; gap: 10px; overflow-wrap: break-word;">
                    <input type="text" id="reply-input" placeholder="Type your reply..." style="font-size: 1.5rem;flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border-gray); font-family: var(--font-body); overflow-wrap: break-word;">
                    <button class="form-button" style="margin: 0;" onclick="addReply()">Reply</button>
                </div>
            </div>
        </div>
    </div>
<!-- Floating Accessibility Button -->
<button class="a11y-fab" onclick="document.getElementById('a11y-menu').classList.toggle('show')"><img src="eye.svg"></button>
<div id="a11y-menu" class="a11y-menu">
    <h4 style="margin-bottom: 5px; font-size: 2rem;">Accessibility</h4>
    <label style="font-size: 1.5rem;"><input type="checkbox" id="toggle-dark" onchange="toggleA11y('dark')"> Dark Mode</label>
    <label style="font-size: 1.5rem;"><input type="checkbox" id="toggle-dyslexia" onchange="toggleA11y('dyslexia')"> Dyslexia Font</label>
    <label style="font-size: 1.5rem;"><input type="checkbox" id="toggle-colorblind" onchange="toggleA11y('colorblind')"> High Contrast</label>
</div>
    <footer>
        <p>&copy; 2026 Paso a Paso. Good luck! ¡Buena suerte!</p>
    </footer>
</body>
</html>
