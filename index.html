<!DOCTYPE html>
<html lang="en">
<head>
    <title>Website Design</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special Gothic Expanded One&family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="script.js"></script> 
</head>

<body>

    <header>
        <!-- login -->
        <h3>
            <a href="login.html" id="login-status-link" class="login-link">Login</a>
        </h3>

        <!-- logo -->
        <a href="#home" class ="logo-link">
            <span>Paso a Paso</span> <img style="height: 45px; width: 45px;"; src="orange.svg">
        </a>

        <!-- navigation -->
        <nav>
            <a href="#home">Home</a>
            <a href="resources.html">Resources</a>
            <a href="schedule.html">Schedule</a>
            <a href="settings.html">Settings</a>
        </nav>
    </header>




    <!-- announcement banner -->
    <div id="announcement-banner">
        <!-- annoucement put here by js -->
    </div>

    <!-- home section  -->
    <div class="container" id="resources">
        <h2  class="section-title" style="font-size: 2rem;"></font-size>¡Hola, Student!</h2>
            <h3>You're doing great. Keep the streak alive!</h3>
            <button class="cta-btn">Continue Lesson 5</button>
        </div>
        
        <div class="stats-container">
            <div class="stat-box">
                <strong>5 Day Streak</strong>
            </div>
            <div class="stat-box">
                <strong>1200 XP</strong>
                <div class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
                <small>Level 4</small>
            </div>
        </div>
    </div>

    <!-- MAIN DASHBOARD GRID -->
    <main class="dashboard-grid">
        
        <!-- Card 1: Word of the Day -->
        <div class="card">
            <div class="card-header">Word of the Day
            </div>
            <div class="spanish-word">El mar</div>
            <div class="english-def">The sea</div>
            <button class="listen-btn">🔊 Listen</button>
        </div>

        <!-- Card 2: Schedule Preview -->
        <div class="card">
            <div class="card-header">Coming Up
            </div>
            
            <div class="event-item">
                <div class="event-date">TUE</div>
                <div>
                    <strong>Grammar Quiz</strong>
                    <p style="font-size:0.8rem; color:#666;">10:00 AM</p>
                </div>
            </div>

            <div class="event-item">
                <div class="event-date">THU</div>
                <div>
                    <strong>Conversation Club</strong>
                    <p style="font-size:0.8rem; color:#666;">3:30 PM</p>
                </div>
            </div>
        </div>

        <!-- Card 3: Quick Links (Resources) -->
        <div class="card">
            <div class="card-header">Quick Access
            </div>
            <div class="quick-links">
                <a href="#" class="quick-link-btn">
                    <div class="circle-icon">📝</div>
                    <span>Verbs</span>
                </a>
                <a href="#" class="quick-link-btn">
                    <div class="circle-icon">📚</div>
                    <span>Dict</span>
                </a>
                <a href="#" class="quick-link-btn">
                    <div class="circle-icon">🎧</div>
                    <span>Audio</span>

</div>

</body>
</html>
