<!DOCTYPE html>
<html lang="en">
<head>
    <title>Website Design</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special Gothic Expanded One&family=Special+Gothic+Expanded+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="script.js"></script> 
</head>

<body>

    <header>
        <!-- login -->
        <h3>
            <a href="login.html" id="login-status-link" class="login-link">Login</a>
        </h3>

        <!-- logo -->
        <a href="#home" class ="logo-link">
            <span>Paso a Paso</span> <img style="height: 45px; width: 45px;"; src="orange.svg">
        </a>

        <!-- navigation -->
        <nav>
            <a href="#home">Home</a>
            <a href="resources.html">Resources</a>
            <a href="schedule.html">Schedule (Tutoring+Group Study)</a>
            <a href="settings.html">Settings</a>
        </nav>
    </header>

<div class="container" id="schedule">
    <h2 class="section-title">Meetings Schedule</h2>
    
    <!-- calendar header -->
    <div class="calendar-header">
        <button id="prevMonth" class="nav-btn"><img style="height: 50px; width: 50px;" src="leftarrow.svg"></button>
        <h3 id="monthYear">Month Year</h3>
        <button id="nextMonth" class="nav-btn"><img style="height: 50px; width: 50px;" src="rightarrow.svg"></button>
    </div>

    <!-- grid -->
    <div class="calendar-grid" id="calendar">
    </div>
    
    <!-- key -->
    <div style="margin-top: 20px; display: flex; gap: 20px; justify-content: center;">
        <span style="font-size: 0.9rem;"><span style="color: var(--text-muted);">●</span> Tutoring Session</span>
        <span style="font-size: 0.9rem;"><span style="color: var(--accent-black);">●</span> Group Study</span>
    </div>
</div>

<!-- popup modal (hidden by default) -->
<div id="eventModal" class="modal hidden">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h3 id="modalDate" style="color: var(--text-muted);">Date</h3>
        
        <!-- view events -->
        <div id="existingEvents"></div>

        <!-- admin only add event form -->
        <div id="adminEventForm" class="hidden" style="margin-top: 20px; border-top: 1px solid #333; padding-top: 10px;">
            <h4 style="font-size: 1rem;">Admin: Schedule Meeting</h4>
            <input type="text" id="eventTitle" placeholder="Topic (e.g. Subjunctive)" style="width: 100%; margin-bottom: 10px; padding: 5px;">
            <select id="eventType" style="width: 100%; margin-bottom: 10px; padding: 5px;">
                <option value="tutoring">Tutoring</option>
                <option value="group">Group Study</option>
            </select>
            <input type="number" id="eventSpots" placeholder="Max Students (e.g. 5)" style="width: 100%; margin-bottom: 10px; padding: 5px;">
            <button class="form-button" onclick="addEvent()">Add Session</button>
        </div>
    </div>
</div>


</body>
</html>
