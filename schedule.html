<!DOCTYPE html>
<html lang="en">
<head>
    <title>Paso a Paso - Schedule</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="script.js" defer></script> 
</head>
<body>
    <!-- Announcement Banner -->
    <div id="announcement-banner"></div>

    <header class="main-header">
        <div class="header-content">
            <!-- Login Link -->
            <a href="login.html" id="login-status-link" class="login-link">Login</a>

            <!-- Logo -->
            <a href="index.html" class="logo-link">
                <span>Paso a Paso</span> <img src="orange.svg" alt="Paso a Paso Logo">
            </a>

            <!-- Navigation (Schedule is Active) -->
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="resources.html">Resources</a>
                <a href="schedule.html" class="active">Schedule</a>
                <a href="settings.html">Settings</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-card">
                <h1 style="color: var(--primary-orange);">Meeting Schedule</h1>
                <p style="color: var(--text-light); font-size: 1.1rem;">Book tutoring sessions and join group study rooms!</p>
            </div>
        </section>

        <!-- Calendar Section -->
        <section class="card-section">
            <div class="card" style="width: 100%; max-width: 900px; padding: var(--spacing-lg);">
                
                <!-- Calendar Navigation -->
                <div class="calendar-header">
                    <button id="prevMonth" class="nav-btn">
                        <img src="leftarrow.svg" alt="Previous Month" style="height: 25px; filter: opacity(0.7);">
                    </button>
                    <h2 id="monthYear" style="color: var(--primary-orange);">Month Year</h2>
                    <button id="nextMonth" class="nav-btn">
                        <img src="rightarrow.svg" alt="Next Month" style="height: 25px; filter: opacity(0.7);">
                    </button>
                </div>

                <!-- Calendar Grid (JS will populate this) -->
                <div id="calendar" class="calendar-grid"></div>
                
                <!-- Calendar Legend -->
                <div style="margin-top: 2rem; display: flex; justify-content: center; gap: 2rem; font-weight: 600; color: var(--text-dark); flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="event-dot dot-tutoring" style="margin: 0;"></span> Tutoring Session
                    </div>
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <span class="event-dot dot-group" style="margin: 0;"></span> Group Study
                    </div>
                </div>

            </div>
        </section>

    </main>

    <!-- Event Modal (Hidden by default) -->
    <div id="eventModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h3 id="modalDate" style="color: var(--primary-orange); border-bottom: 2px solid var(--border-gray); padding-bottom: 10px;">Date</h3>
            
            <!-- List of Events for this day -->
            <div id="existingEvents" style="margin-top: 1rem;"></div>

            <!-- Admin Form (Only shows if admin is logged in) -->
            <form id="adminEventForm" class="hidden" style="margin-top: 1.5rem; border-top: 2px solid var(--border-gray); padding-top: 1.5rem;">
                <h4 style="color: var(--accent-blue-dark); margin-bottom: 1rem; font-family: var(--font-heading);">Admin: Schedule Meeting</h4>
                
                <div class="form-group">
                    <label style="color: var(--text-dark);">Session Title</label>
                    <input type="text" id="eventTitle" placeholder="e.g. Grammar Quiz Prep" required>
                </div>
                
                <div class="form-group" style="display: flex; gap: 1rem;">
                    <div style="flex: 1;">
                        <label style="color: var(--text-dark);">Type</label>
                        <select id="eventType">
                            <option value="tutoring">Tutoring</option>
                            <option value="group">Group Study</option>
                        </select>
                    </div>
                    <div style="flex: 1;">
                        <label style="color: var(--text-dark);">Total Spots</label>
                        <input type="number" id="eventSpots" placeholder="e.g. 5" min="1" required>
                    </div>
                </div>
                
                <button type="button" class="form-button" onclick="addEvent()" style="margin-top: 1rem; width: 100%;">
                    <img src="plus.svg" alt="Add" style="height: 18px; display: inline-block; vertical-align: middle; margin-right: 5px; filter: brightness(0) invert(1);"> 
                    Add Session
                </button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Paso a Paso. Good luck! ¡Buena suerte!</p>
    </footer>

</body>
</html>
