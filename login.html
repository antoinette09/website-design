<!DOCTYPE html>
<html lang="en">
<head>
    <title>Paso a Paso - Q&A Forum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script> 
</head>

<body>
    <div id="announcement-banner"></div>
    <header class="main-header">
        <div class="header-content">
            <a href="login.html" id="login-status-link" class="login-link">Login</a>
            <a href="index.html" class="logo-link"><span>Paso a Paso</span> <img src="orange.svg" alt="Logo"></a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="resources.html">Resources</a>
                <a href="schedule.html">Schedule</a>
                <a href="forum.html">Community Q&A</a>
                <a href="settings.html">Settings</a>
            </nav>
        </div>
    </header>

    <main class="container" style="align-items: center; justify-content: center; flex-grow: 1; display: flex;">
        <div id="auth-forms" class="auth-container">
            <div class="auth-header">
                <h2 id="form-title" style="color: var(--primary-orange);">Student Login</h2>
            </div>
            <div id="message-area" class="message-box" style="margin-bottom: 1rem;"></div>
            <form id="auth-form" style="text-align: left;">
                <div class="form-group"><input type="text" id="username" placeholder="Username" required></div>
                <div class="form-group"><input type="password" id="password" placeholder="Password" required></div>
                <div id="email-group" class="form-group hidden"><input type="email" id="email" placeholder="Email (Optional)"></div>
                <div id="admin-code-group" class="form-group hidden"><input type="password" id="admin-code" placeholder="Admin Code (Optional)"></div>
                <button type="submit" id="submitbutton" class="form-button" style="width: 100%;">Log In</button>
            </form>
            <div style="margin-top: 1rem;">
                <span id="toggle-text-span" style="color: var(--text-dark);">Don't have an account? </span>
                <button class="form-button secondary" onclick="toggleAuthMode()" style="padding: 0.4rem 1rem;">Sign Up</button>
            </div>
        </div>

        <div id="admin-view" class="hidden" style="width: 100%; max-width: 900px; margin: 0 auto;">
            <div class="admin-header">
                <h2 style="color: var(--accent-blue-dark); margin: 0;">Admin Dashboard</h2>
                <button class="form-button secondary" style="max-width: 300px;" onclick="handleLogout()">Log Out</button>
            </div>
            
            <div class="card" style="text-align: left; margin-bottom: 2rem;">
                <h3 style="color: #e67e22; margin-bottom: 1rem;">⏳ Pending Meeting Requests</h3>
                <div id="pending-requests-container">
                    <!-- Pending Requests loaded by JS -->
                </div>
            </div>

            <div class="two-col-grid">
                <div class="card" style="text-align: left; height: fit-content;">
                    <h3 style="color: var(--primary-orange);">Post Announcement</h3>
                    <form onsubmit="saveAnnouncement(event)">
                        <div class="form-group"><textarea id="announcement-input" class="admin-textarea" rows="3" style="width: 100%; padding: 10px;"></textarea></div>
                        <div style="display: flex; gap: 10px;">
                            <button type="submit" class="form-button" style="flex: 1;">Post</button>
                            <button type="button" class="form-button secondary" onclick="clearAnnouncement()" style="flex: 1;">Remove</button>
                        </div>
                    </form>
                </div>
                <div class="card" style="text-align: left;">
                    <h3 style="color: var(--primary-orange);">Manage Accounts</h3>
                    <div id="user-list-container" class="user-list"></div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
