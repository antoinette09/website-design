<!DOCTYPE html>
<html lang="en">
<head>
    <title>Paso a Paso - Q&A Forum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script> 
</head>

<body>
    <div id="announcement-banner"></div>
    <header class="main-header">
        <div class="header-content">
            <a href="login.html" id="login-status-link" class="login-link">Login</a>
            <a href="index.html" class="logo-link"><span>Paso a Paso</span> <img src="orange.svg" alt="Logo"></a>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="resources.html">Resources</a>
                <a href="schedule.html">Schedule</a>
                <a href="forum.html">Community Q&A</a>
                <a href="settings.html"  class="active">Settings</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="align-items: center;">
        
        <h1 class="section-title" style="margin-top: 1rem;">Account Settings</h1>

        <div style="display: flex; flex-direction: column; gap: 2rem; width: 100%; max-width: 500px;">
            
            <!-- Profile Settings Card -->
            <section class="card" style="text-align: left; width: 100%;">
                <h2 style="color: var(--accent-blue-dark); font-size: 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                    <img src="gear.svg" alt="Settings" style="height: 25px;"> Edit Profile
                </h2>
                
                <div class="form-group">
                    <label for="edit-username"><img src="user.svg" style="height: 15px; display: inline;"> Update Username</label>
                    <input type="text" id="edit-username" placeholder="Enter new username">
                </div>

                <div class="form-group" style="margin-top: 1rem;">
                    <label for="edit-password"><img src="lock.svg" style="height: 15px; display: inline;"> Update Password</label>
                    <input type="password" id="edit-password" placeholder="Enter new password">
                </div>

                <button class="form-button" onclick="updateProfile()" style="width: 100%; margin-top: 1.5rem;">Save Changes</button>
            </section>

            <!-- Danger Zone Card -->
            <section class="card" style="text-align: left; width: 100%; border: 2px solid #e74c3c; background-color: #fdf5f5;">
                <h3 style="color: #e74c3c; font-size: 1.5rem; display: flex; align-items: center; gap: 10px;">
                    <img src="alert.svg" alt="Warning" style="height: 25px;"> Danger Zone
                </h3>
                
                <div style="margin: 1rem 0;">
                    <strong style="color: var(--text-dark); display: block; font-size: 1.1rem;">Delete Account</strong>
                    <p style="font-size: 0.95rem; color: #555; margin-top: 5px;">This will permanently delete your account, your XP, and your progress. This action cannot be undone.</p>
                </div>
                
                <button class="form-button" style="background-color: #e74c3c; color: white; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;" onclick="deleteMyAccount()">
                    <img src="trash.svg" alt="Delete" style="height: 18px; filter: brightness(0) invert(1);"> Delete Account
                </button>
            </section>

        </div>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Paso a Paso. Good luck! ¡Buena suerte!</p>
    </footer>

</body>
</html>
