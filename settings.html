<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        // This is the ONLY bit that MUST be here to kill the flash
        const s = JSON.parse(localStorage.getItem('a11ySettings') || '{}');
        if (s.dark || s.colorblind) document.documentElement.style.backgroundColor = '#121212';
        if (s.dark) document.documentElement.classList.add('dark-mode');
        if (s.colorblind) document.documentElement.classList.add('colorblind-mode');
        if (s.dyslexia) document.documentElement.classList.add('dyslexia-mode');

      </script>
    <title>Paso a Paso - Q&A Forum</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Special+Gothic+Expanded+One&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="script.js" defer></script> 
</head>

<body>
<div id="announcement-banner">
    <span id="announcement-text"></span> <!-- Use a span for the text -->
    <script>
        (function() {
            const saved = localStorage.getItem('siteAnnouncement');
            if (saved && saved.trim() !== "") {
                const textEl = document.getElementById('announcement-text');
                if (textEl) {
                    textEl.textContent = saved;
                    // Tell the whole page we are ready to show the banner
                    document.documentElement.classList.add('banner-ready');
                }
            } else {
                // If there's truly no announcement, collapse the box
                document.getElementById('announcement-banner').style.display = 'none';
            }
        })();
    </script>
</div>
    <header class="main-header">
        <div class="header-content">
            <a href="login.html" id="login-status-link" class="login-link">Login</a>
            <a href="index.html" class="logo-link"><span>Paso a Paso</span> <img src="orange.svg" alt="Logo"></a>
            <button class="hamburger" onclick="document.getElementById('nav-menu').classList.toggle('show')">☰</button>
            <nav class="main-nav">
                <a href="index.html">Home</a>
                <a href="resources.html">Resources</a>
                <a href="schedule.html">Schedule</a>
                <a href="forum.html">Community Q&A</a>
                <a href="settings.html"  class="active">Settings</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container" style="align-items: center;">
        
        <h1 class="section-title" style="font-size: 2rem; margin-top: 1.5rem;">Account Settings</h1>

        <div style="display: flex; flex-direction: column; gap: 2rem; width: 100%; max-width: 500px;">
            
            <!-- Profile Settings Card -->
            <section class="card" style="text-align: left; width: 100%; background-color: var(--bg-light-orange);">
                <h2 style="color: var(--accent-blue-dark); font-size: 1.75rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 10px;">
                    <img src="gear.svg" alt="Settings" style="height: 50px; font-size: 1.75rem;"> Edit Profile
                </h2>
                
                <div class="form-group">
                    <label for="edit-username"><img src="user.svg" style="font-size: 1.5rem; height: 50px; display: inline;"> Update Username</label>
                    <input type="text" id="edit-username" style="font-size: 1.75rem;" placeholder="Enter new username">
                </div>

                <div class="form-group">
                    <label for="edit-password"><img src="lock.svg" style="font-size: 1.5rem; height: 50px; display: inline;"> Update Password</label>
                    <input type="password" id="edit-password"style="font-size: 2rem;"placeholder="Enter new password">
                </div>

                <button class="form-button" onclick="updateProfile()" style="width: 100%; margin-top: 1.5rem;">Save Changes</button>
            </section>

            <!-- Danger Zone Card -->
            <section class="card" style="text-align: left; width: 100%; border: 2px solid #e74c3c; background-color: #fdf5f5;">
                <h3 style="color: #e74c3c; font-size: 1.5rem; display: flex; align-items: center; gap: 10px;">
                    <img src="alert.svg" alt="Warning" style="height: 50px;"> Danger Zone
                </h3>
                
                <div style="margin: 1.5rem 0;">
                    <strong style="color: #e74c3c; display: block; font-size: 1.5rem;">Delete Account</strong>
                    <p style="font-size: 1.5rem; color: #555; margin-top: 5px;">This will permanently delete your account, your XP, and your progress. This action cannot be undone.</p>
                </div>
                
                <button class="form-button" style="background-color: #e74c3c; color: white; width: 100%; display: flex; justify-content: center; align-items: center; gap: 8px;" onclick="deleteMyAccount()">
                    <img src="trash.svg" alt="Delete" style="height: 50px;"> Delete Account
                </button>
            </section>

        </div>

    </main>
<!-- Floating Accessibility Button -->
<button class="a11y-fab" onclick="document.getElementById('a11y-menu').classList.toggle('show')"><img src="eye.svg"></button>
<div id="a11y-menu" class="a11y-menu">
    <h4 style="margin-bottom: 5px; font-size: 2rem;">Accessibility</h4>
    <label style="font-size: 1.5rem;"><input type="checkbox" id="toggle-dark" onchange="toggleA11y('dark')"> Dark Mode</label>
    <label style="font-size: 1.5rem;"><input type="checkbox" id="toggle-dyslexia" onchange="toggleA11y('dyslexia')"> Dyslexia Font</label>
    <label style="font-size: 1.5rem;"><input type="checkbox" id="toggle-colorblind" onchange="toggleA11y('colorblind')"> High Contrast</label>
</div>
    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Paso a Paso. Good luck! ¡Buena suerte!</p>
    </footer>

</body>
</html>
